wrapped 1.5 turns around a vertical wooden post connects a heavy load on one side to a light load on the other. Friction along the wrap multiplies tension exponentially (F_pull/F_hold = e^(μθ)), so the tiny light weight is enough to \"hold\" the much heavier weight. Here the rope is decoration (sequence of capsule segments on a helical wrap + Bezier tails), and the physics is ", "path": "A/capstan_effect.mp4"}, {"i": 6, "folder": "A", "name": "coefficient_of_restitution", "desc": "A single ball is dropped onto a hard floor with contact tuned for ~85% coefficient of restitution. Successive bounce heights follow h_n = h₀·e^(2n) where e is the coefficient of restitution, giving a clean geometric decay envelope over roughly 5–8 visible bounces.", "path": "A/coefficient_of_restitution.mp4"}, {"i": 7, "folder": "A", "name": "coin_spiral", "desc": "Euler's disk / coin spiral: a thin disc set on its edge with a small tilt and large spin loses energy to floor friction, gradually tilting more and rolling on a smaller effective contact radius. Pitch of the precession audibly rises in the real demo; visually the precession speeds up and the coin finally lies flat after a few seconds.", "path": "A/coin_spiral.mp4"}, {"i": 8, "folder": "A", "name": "com_pair_track", "desc": "Two cubes on a frictionless track, masses 2:1. With initial velocities chosen so total momentum is exactly zero, the two masses fly apart in opposite directions but their center of mass stays fixed — exactly what a compressed spring between them at t=0 would produce. A thin vertical brass \"COM\" post marks the system center of mass and remains permanently aligned with the mass-weighted midpoint.", "path": "A/com_pair_track.mp4"}, {"i": 9, "folder": "A", "name": "cone_balanced_on_tip", "desc": "An inverted smooth cone is in unstable equilibrium standing on its apex. Any small perturbation breaks the symmetry; the restoring torque about the apex is negative (gravity amplifies the tilt) so the motion accelerates from imperceptible to a full topple in roughly 1.5 s. A tiny initial tilt (~0.2°) about the y-axis seeds the instability.", "path": "A/cone_balanced_on_tip.mp4"}, {"i": 10, "folder": "A", "name": "damped_pendulum_decay", "desc": "A simple pendulum with viscous damping at the hinge shows exponential decay of amplitude: θ(t) = θ₀·e^(-γt)·cos(ωt). Period is nearly unchanged for light damping; the envelope decay should be visible over roughly 8 swings before the pendulum settles to rest.", "path": "A/damped_pendulum_decay.mp4"}, {"i": 11, "folder": "A", "name": "falling_chain_classical", "desc": "A 24-segment chain initially L-shaped: half on a table, half hanging off the edge. Released from rest under gravity; the hanging portion's weight progressively drags the on-table portion off, and chain acceleration exceeds g once most of it is airborne.", "path": "A/falling_chain_classical.mp4"}, {"i": 12, "folder": "A", "name": "inelastic_collision", "desc": "One-dimensional collision between two equal-mass spheres on a frictionless floor. Ball A is launched toward stationary ball B with initial v₀ = 1.5 m/s (set via `--init-qvel`). Contact is tuned soft enough to be partially inelastic — the collision dissipates kinetic energy and momentum is shared between the two balls afterwards. Note: although the scene XML header comment references the \"elastic\" ", "path": "A/inelastic_collision.mp4"}, {"i": 13, "folder": "A", "name": "slider_crank_mechanism", "desc": "Slider-crank linkage — the basic mechanism used in every internal-combustion engine. A continuously rotating crank disc drives a reciprocating piston via a connecting rod. Because MuJoCo's body tree is a tree, the closed kinematic loop (crank → rod → piston → ground) is closed by a `<connect>` equality constraint that locks the rod's far end to the piston pin.", "path": "A/slider_crank_mechanism.mp4"}, {"i": 14, "folder": "A", "name": "tippe_top", "desc": "A tippe top is an asymmetric top (rounded heavy hemisphere bottom + thin stem on top) that, when spun fast about its symmetry axis, inverts itself — the stem flips down and the top ends up balancing on the stem. The flip is driven by contact friction torque combined with the asymmetric inertia tensor. Initial state: hemisphere upright on the floor, spinning about world +z at ω ≈ 80 rad/s.", "path": "A/tippe_top.mp4"}, {"i": 15, "folder": "A", "name": "wave_reflection_fixed", "desc": "A pulse propagating along a discretized string reflects off a fixed (clamped) end with inverted polarity. The string is a chain of 41 small bodies linked by hinge joints with rotational stiffness; the left end is rigidly attached to a wooden wall, the right end is free. An initial Gaussian pulse encoded as hinge angles propagates to the wall and returns inverted.", "path": "A/wave_reflection_fixed.mp4"}, {"i": 16, "folder": "A", "name": "wilberforce_pendulum", "desc": "A mass hangs on a spring that has both longitudinal and torsional stiffness. With the two periods (bobbing vs. twisting) matched within a few percent and a weak coupling between them, energy slowly trades between bobbing and twisting modes — the classic Wilberforce beat pattern. Implementation: one body with a slide-z joint and a hinge-z joint, each with its own spring stiffness, plus a soft equal", "path": "A/wilberforce_pendulum.mp4"}, {"i": 17, "folder": "A", "name": "yoyo_with_reversal", "desc": "Maxwell wheel / yo-yo: a heavy disc with a thin axle is suspended by two strings wound around the axle. As the wheel descends it must rotate to unspool the strings; rolling-without-slip is enforced by a joint equality constraint between the vertical slide and the rotational hinge. The slider hits a stop at its lower limit, causing the wheel to bounce back up and re-ascend while still spinning in t", "path": "A/yoyo_with_reversal.mp4"}, {"i": 18, "folder": "B", "name": "anharmonic_pendulum_large_swing", "desc": "大角度摆：初始角 >90°，周期比小角 SHM 明显偏长，轨迹非正弦", "path": "B/anharmonic_pendulum_large_swing.mp4"}, {"i": 19, "folder": "B", "name": "balance_beam_lever", "desc": "杠杆转矩：不等重物在支点两侧平衡，力矩 F×d 相等时不动", "path": "B/balance_beam_lever.mp4"}, {"i": 20, "folder": "B", "name": "ballistic_pendulum", "desc": "弹道摆：子弹嵌入悬摆，由摆幅反算子弹初速", "path": "B/ballistic_pendulum.mp4"}, {"i": 21, "folder": "B", "name": "bead_on_cycloid_track_isochrony", "desc": "摆线等时性：三颗珠子从不同位置同时释放，同一时刻到达最低点", "path": "B/bead_on_cycloid_track_isochrony.mp4"}, {"i": 22, "folder": "B", "name": "cannon_recoil", "desc": "炮筒后坐：炮弹射出，炮筒反向后退，演示牛顿第三定律", "path": "B/cannon_recoil.mp4"}, {"i": 23, "folder": "B", "name": "dzhanibekov_effect", "desc": "丹尼别科夫效应：中间轴不稳定，T形柄在太空中自发翻转", "path": "B/dzhanibekov_effect.mp4"}, {"i": 24, "folder": "B", "name": "falling_chimney", "desc": "倒塌烟囱：顶部受扰的高刚性柱倒塌，展示各段加速度关系", "path": "B/falling_chimney.mp4"}, {"i": 25, "folder": "B", "name": "geneva_drive", "desc": "日内瓦间歇机构：主动轮连续转动，带动星形轮每次间歇步进 90°", "path": "B/geneva_drive.mp4"}, {"i": 26, "folder": "B", "name": "glancing_2d_collision", "desc": "二维斜碰：两球弹性斜碰，动量和能量守恒决定散射角", "path": "B/glancing_2d_collision.mp4"}, {"i": 27, "folder": "B", "name": "gyroscope_on_string", "desc": "绳悬陀螺进动：高速陀螺被细绳吊住一端，在重力矩作用下水平进动", "path": "B/gyroscope_on_string.mp4"}, {"i": 28, "folder": "B", "name": "normal_modes_2mass", "desc": "两质量弹簧正规模式：同相与反相振动两种本征模频率对比", "path": "B/normal_modes_2mass.mp4"}, {"i": 29, "folder": "B", "name": "pendulum_with_air_drag", "desc": "空气阻力摆：二次阻尼使摆幅比粘性阻尼衰减更快，轨迹不对称", "path": "B/pendulum_with_air_drag.mp4"}, {"i": 30, "folder": "B", "name": "rolling_cone", "desc": "圆锥滚动：圆锥以侧面着地绕顶点做圆周滚动", "path": "B/rolling_cone.mp4"}, {"i": 31, "folder": "B", "name": "sliding_chain_off_table", "desc": "链条悬挂加速滑落：链端悬出桌面，全链加速滑落", "path": "B/sliding_chain_off_table.mp4"}, {"i": 32, "folder": "B", "name": "stick_slip", "desc": "粘滑振荡：静/动摩擦切换产生周期性锯齿状运动", "path": "B/stick_slip.mp4"}, {"i": 33, "folder": "B", "name": "trifilar_pendulum", "desc": "三线悬盘：三根等长细线连接圆盘，盘做扭转振动，可测转动惯量", "path": "B/trifilar_pendulum.mp4"}, {"i": 34, "folder": "B", "name": "wave_reflection const STORE_KEY="taskReview_AO_v1";
let ann=JSON.parse(localStorage.getItem(STORE_KEY)||"{}");

const tbody=document.getElementById("tbody");
const folders=[...new Set(DATA.map(d=>d.folder))];
const ff=document.getElementById("folderFilter");
folders.forEach(f=>{const o=document.createElement("option");o.value=f;o.textContent="文件夹 "+f;ff.appendChild(o);});

function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function flash(){const e=document.getElementById("saved");e.classList.add("show");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("show"),900);}
function save(){localStorage.setItem(STORE_KEY,JSON.stringify(ann));flash();}

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const fSel=ff.value, kSel=document.getElementById("keepFilter").value;
  tbody.innerHTML="";
  let shown=0;
  DATA.forEach(d=>{
    if(fSel && d.folder!==fSel) return;
    if(q && !(d.name.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q))) return;
    const a=ann[d.path]||{keep:"",comment:""};
    if(kSel==="yes" && a.keep!=="yes") return;
    if(kSel==="no" && a.keep!=="no") return;
    if(kSel==="undecided" && a.keep) return;
    shown++;
    const tr=document.createElement("tr");
    tr.className = a.keep==="yes"?"keep-yes":(a.keep==="no"?"keep-no":"");
    const url=RAW+d.path.split("/").map(encodeURIComponent).join("/");
    tr.innerHTML=
      '<td class="td-num">'+d.i+'</td>'+
      '<td><span class="badge">'+d.folder+'</span></td>'+
      '<td class="td-name">'+esc(d.name)+'</td>'+
      '<td class="td-desc">'+esc(d.desc)+'</td>'+
      '<td class="td-vid"><video src="'+url+'" controls preload="none" playsinline></video></td>'+
      '<td><select class="keep-sel"><option value="">待定</option>'+
         '<option value="yes"'+(a.keep==="yes"?" selected":"")+'>保留</option>'+
         '<option value="no"'+(a.keep==="no"?" selected":"")+'>删除</option></select></td>'+
      '<td><textarea class="comment" placeholder="写下对该视频的点评…">'+esc(a.comment||"")+'</textarea></td>';
    const sel=tr.querySelector(".keep-sel"), ta=tr.querySelector(".comment");
    sel.addEventListener("change",()=>{ann[d.path]={...(ann[d.path]||{}),keep:sel.value,name:d.name,folder:d.folder};save();tr.className=sel.value==="yes"?"keep-yes":(sel.value==="no"?"keep-no":"");});
    ta.addEventListener("input",()=>{ann[d.path]={...(ann[d.path]||{}),comment:ta.value,name:d.name,folder:d.folder};save();});
    tbody.appendChild(tr);
  });
  const keptN=Object.values(ann).filter(a=>a.keep==="yes").length;
  const cutN=Object.values(ann).filter(a=>a.keep==="no").length;
  document.getElementById("count").textContent="显示 "+shown+" / 共 "+DATA.length+" 条　|　保留 "+keptN+"　删除 "+cutN+"　待定 "+(DATA.length-keptN-cutN);
}
["search","folderFilter","keepFilter"].forEach(id=>document.getElementById(id).addEventListener("input",render));

document.getElementById("exportJson").addEventListener("click",()=>{
  dl("task_review.json", JSON.stringify(ann,null,2), "application/json");
});
document.getElementById("exportCsv").addEventListener("click",()=>{
  let csv="﻿folder,name,keep,comment,description,video_url\n";
  DATA.forEach(d=>{const a=ann[d.path]||{};const keep=a.keep==="yes"?"保留":(a.keep==="no"?"删除":"待定");
    const url=RAW+d.path.split("/").map(encodeURIComponent).join("/");
    csv+=[d.folder,d.name,keep,a.comment||"",d.desc,url].map(csvCell).join(",")+"\n";});
  dl("task_review.csv", csv, "text/csv");
});
function csvCell(s){s=String(s==null?"":s);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
function dl(name,content,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
document.getElementById("importJson").addEventListener("change",e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const obj=JSON.parse(r.result);ann=Object.assign(ann,obj);save();render();alert("已导入并合并标注。");}catch(err){alert("导入失败："+err);}};
  r.readAsText(f);
});
document.getElementById("clearAll").addEventListener("click",()=>{if(confirm("确定清空本浏览器中的全部标注？此操作不可撤销（建议先导出）。")){ann={};save();render();}});
render();
